<script>

    /*
    ------------- Traditional Event Handling --------------
    
    document.getElementById('owl').onclick = function(){
         alert("owl clicked")
    }
    
    document - >  represents the entire HTML page
    getElementById() -> searches for an element having a specifc id
    onclick -> is an event property ; event handler for click event
    function(){ alert("owl clicked") } -> event hadnler ; anonymous function that will be executed when the click event occurs on the element with id 'owl'
    
    Why this approach is not preferred?

       - Only one click handler can exist because the second assignment will overwrite the first one.


    */

    /*
    ------------- Modern Event Handling --------------
    
    document.getElementById('owl').addEventListener('click', function(){
         alert("owl clicked")
    })
    
    document - >  represents the entire HTML page
    getElementById() -> searches for an element having a specifc id
    addEventListener() -> attaches an event listener to an element
    'click' -> the type of event to listen for
    function(){ alert("owl clicked") } -> event handler ; anonymous function that will be executed when the click event occurs on the element with id 'owl'
    
    Why this approach is preferred?

       - it allows multiple event listeners to be attached to the same element without overwriting each other.


    */    

    // attachEvent() -> Old Internet Explorer method
    // jQuery - on  -> Before modern JavaScript became powerful, developers used jQuery.

    /*
     ----------------------------- Event Object Properties --------------------
     when an event occurs, the browser creates an event object that contains information about the event. 
     This object is passed as an argument to the event handler function.

        `e` contians information about click 

        e.type -> useful when same handler handles multiple events
        e.target -> the element that triggered the event
        e.timestamp -> the time when the event occurred
        e.preventDefault() -> prevents the default action associated with the event (e.g., following a link)
        e.stopPropagation() -> stops the event from bubbling up to parent elements



    
    */

    /*
    ----------------------------- Event Bubbling --------------------
    When an event occurs on an element, it first runs the handlers on it, then on its parent, then all the way up on other ancestors.
   
   
     document.getElementById('images').addEventListener('click', function(e){
     console.log("clicked inside the ul");
     }, false)
    
    here `false` indicates that the event listener is in the bubbling phase.
    If it were `true`, it would be in the `capturing phase`.

    */
